<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document QA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Document QA</h1>
            <p class="subtitle">Upload a document and ask questions about it</p>
            <div class="backend-status" id="backend-status">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </header>

        <section class="upload-section">
            <div class="section-header">
                <h2>1. Upload Document</h2>
                <span class="model-indicator" id="upload-model"></span>
            </div>
            <form id="upload-form">
                <input type="file" id="file-input" accept=".pdf,.txt,.docx" required>
                <button type="submit" id="upload-btn">Upload</button>
            </form>
            <div class="sample-file" id="sample-file" draggable="true">
                <svg class="pdf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <text x="7" y="16" font-size="5" font-weight="bold" fill="currentColor" stroke="none">PDF</text>
                </svg>
                <span>Led_Zeppelin.pdf</span>
            </div>
            <p class="sample-hint">Click or drag the sample to the upload area</p>
            <div id="upload-status" class="status"></div>
        </section>

        <section class="qa-section" id="qa-section">
            <div class="section-header">
                <h2>2. Ask a Question</h2>
                <span class="model-indicator" id="qa-model"></span>
            </div>
            <div class="document-info" id="document-info"></div>
            <form id="qa-form">
                <input type="text" id="question-input" placeholder="Who is Jimmy Page?" required>
                <button type="submit" id="ask-btn">Ask</button>
            </form>
        </section>

        <section class="answer-section" id="answer-section">
            <div class="section-header">
                <h2>3. Answer</h2>
                <span class="model-indicator" id="answer-model"></span>
            </div>
            <div id="answer-content"></div>
            <details id="sources-details">
                <summary>Sources</summary>
                <div id="sources-content"></div>
            </details>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
